<div th:fragment="summaryRow(heading, optionalHeadingParam, values, actions, valueUrl, valueUrlOpensNewTab, withoutBottomBorder, withAriaLabelForAction)" class="govuk-summary-list__row"
     th:classappend="${withoutBottomBorder} ? 'govuk-summary-list__row--no-border' : ''">
    <dt class="govuk-summary-list__key" th:text="#{${heading}(${optionalHeadingParam})}">
    </dt>
    <dd th:if="${values != null}" class="govuk-summary-list__value" >
        <a th:href="@{${valueUrl}}"
           th:if="${valueUrl} != null"
           th:attr="target=${valueUrlOpensNewTab} ? '_blank' : null, rel=${valueUrlOpensNewTab} ? 'noreferrer noopener' : null"
           class="govuk-link"
           th:text="${#messages.msgOrNull(values)} ?: ${{values}}">
        </a>
        <!--/* If and only if there is a single value (as opposed to a list) we should th:remove the p tag to avoid unnecessary nesting */-->
        <th:block th:if="${valueUrl} == null" th:each="value, iteratorStatus: ${values}">
            <!--/* RichTextValue: delegate to dedicated fragment (th:if must be on a wrapper so it runs before th:replace) */-->
            <th:block th:if="${value.class.simpleName == 'RichTextValue'}">
                <th:block th:replace="~{fragments/richTextValue :: richTextValue(${value}, ${iteratorStatus.size == 1})}">
                </th:block>
            </th:block>
            <!--/* Plain value: existing behavior */-->
            <p th:if="${value.class.simpleName != 'RichTextValue'}"
               class="govuk-body"
               th:remove="${iteratorStatus.size == 1} ? tag : none"
               th:text="${#messages.msgOrNull(value)} ?: ${{value}}">row.convertedFieldValue</p>
        </th:block>
    </dd>
    <dd class="govuk-summary-list__actions" th:attr="aria-label=${withAriaLabelForAction} ? #{${withAriaLabelForAction}} : null">
        <ul class="govuk-summary-list__actions-list">
            <li th:each="action: ${actions}" class="govuk-summary-list__actions-list-item">
                <a class="govuk-link" th:href="@{${action.url}}" th:text="#{${action.text}}">
                    <span class="govuk-visually-hidden" th:text="#{${heading}}">fieldHeading</span>
                </a>
            </li>
        </ul>
    </dd>
</div>
