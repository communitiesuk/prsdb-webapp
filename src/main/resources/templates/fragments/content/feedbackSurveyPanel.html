<th:block th:fragment="feedbackSurveyPanel(heading, body, surveyUrl, surveyLinkText)">
    <h2 class="govuk-heading-m" th:text="${heading}">Tell us what you think</h2>
    <p class="govuk-body" th:utext="${body}">Answer a few short questions.</p>
    <a th:replace="~{fragments/buttons/primaryButtonLink :: primaryButtonLink(${surveyUrl}, ${surveyLinkText})}">
        Go to survey
    </a>
</th:block>
