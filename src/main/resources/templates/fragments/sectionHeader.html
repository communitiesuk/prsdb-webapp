<p th:fragment="sectionHeader(sectionHeaderInfo)"
   th:if="${sectionHeaderInfo} != null"
   class="govuk-caption-l"
   th:text="${sectionHeaderInfo.useNumbering} ? #{sectionHeader(${sectionHeaderInfo.sectionNumber}, ${sectionHeaderInfo.totalSections}, #{${sectionHeaderInfo.sectionNameKey}})} : #{${sectionHeaderInfo.sectionNameKey}}"
   id="section-header">
    sectionHeader
</p>
