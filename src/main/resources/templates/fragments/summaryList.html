<dl th:fragment="summaryList(listRows)" class="govuk-summary-list">
    <th:block th:each="row: ${listRows}">
        <div th:replace="~{fragments/summaryRow :: summaryRow(${row.fieldHeading}, ${row.optionalFieldHeadingParam}, ${row.convertedFieldValue}, ${row.actions}, ${row.valueUrl},
            ${row.valueUrlOpensNewTab}, ${row.withoutBottomBorder}, ${row.withAriaLabelForAction})}" ></div>
    </th:block>
</dl>
