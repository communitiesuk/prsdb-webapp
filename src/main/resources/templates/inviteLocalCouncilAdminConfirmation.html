<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(#{forms.inviteLocalCouncilAdminUser.title}, ~{::main}, false)}">
<main class="govuk-main-wrapper" id="main-content">
    <div id="page-contents"
         th:replace="~{fragments/layouts/twoThirdsLayout :: twoThirdsLayout(~{::#page-contents/content()})}">
        <div id="confirmation-banner"
             th:replace="~{fragments/banners/confirmationPageBanner :: confirmationPageBanner(#{addLocalCouncilUserSuccess.banner.heading}, ~{::#confirmation-banner/content()})}">
            <span th:text="#{forms.inviteLocalCouncilAdminUserConfirmation.banner.body(${invitedEmailAddress}, ${localCouncilName})}" th:remove="tag">addLocalCouncilUserSuccess.banner.body</span>
        </div>
        <h2 class="govuk-heading-m" th:text="#{common.confirmationPage.whatHappensNext}">common.whatHappensNext</h2>
        <p class="govuk-body" th:text="#{addLocalCouncilUserSuccess.whatHappensNext.paragraph.one}">
            addLocalCouncilUserSuccess.whatHappensNext.para1
        </p>
        <p class="govuk-body" th:text="#{addLocalCouncilUserSuccess.whatHappensNext.paragraph.two(${localCouncilName})}">
            addLocalCouncilUserSuccess.whatHappensNext.para2
        </p>
        <p class="govuk-body" th:text="#{forms.inviteLocalCouncilAdminUserConfirmation.whatHappensNext.paragraph.three(${localCouncilName})}">
            forms.inviteLocalCouncilAdminUserConfirmation.whatHappensNext.paragraph.three
        </p>
        <a th:replace="~{fragments/buttons/primaryButtonLink :: primaryButtonLink(@{${inviteAnotherUserUrl}}, #{addLocalCouncilUserSuccess.inviteAnother})}">
            addLocalCouncilUserSuccess.inviteAnother
        </a>
    </div>
</main>
</html>
