<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="heading" type="java.lang.String"*/-->
<!--/*@thymesVar id="propertyAddress" type="java.util.List"*/-->
<!--/*@thymesVar id="showSuccessBanner" type="java.lang.Boolean"*/-->
<!--/*@thymesVar id="registrationNumber" type="java.lang.String"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/complexQuestionPage :: complexQuestionPage(#{${title}}, ${formModel}, ~{::#form-content}, ~{::#question-content}, ${backUrl}, null)}">
<th:block id="question-content">
    <th:block th:if="${showSuccessBanner}" th:with="isSuccess=${true}">
        <div th:replace="~{fragments/banners/notificationBanner :: notificationBanner(#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.successBanner.title}, ~{::#success-banner-content})}">
            <th:block id="success-banner-content">
                <h3 class="govuk-notification-banner__heading" th:text="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.successBanner.heading}"></h3>
                <p class="govuk-body" th:utext="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.successBanner.body(${registrationNumber})}"></p>
            </th:block>
        </div>
    </th:block>
    <h1 class="govuk-heading-l" th:text="#{${heading}}"></h1>
    <p class="govuk-body" th:utext="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.selectConfirm}"></p>
    <p class="govuk-body">
        <th:block th:each="part, iter : ${propertyAddress}">
            <span th:text="${part}"></span>
            <br th:if="${!iter.last}" />
        </th:block>
    </p>
    <h2 class="govuk-heading-m" th:text="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.responsibilities.heading}"></h2>
    <p class="govuk-body" th:text="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.responsibilities.intro}"></p>
    <ul class="govuk-list govuk-list--bullet">
        <li th:text="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.responsibilities.bullet.one}"></li>
        <li th:text="#{acceptOrRejectJointLandlordInvitation.confirmLandlordForProperty.responsibilities.bullet.two}"></li>
    </ul>
</th:block>
<th:block id="form-content">
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.confirm})}"></button>
</th:block>
</html>
