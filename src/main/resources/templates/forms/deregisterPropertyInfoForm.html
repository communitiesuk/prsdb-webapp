<!DOCTYPE html>
<html>
    <th:block id="main-content"
              th:replace="~{fragments/layout :: layout(#{deregisterProperty.title}, ~{::#main-content/content()}, false)}">
    <a href="#" th:replace="~{fragments/forms/backLink :: backLink(${backUrl})}">Back link</a>
    <main class="govuk-main-wrapper" id="main-content">
        <div id="page-contents"
             th:replace="~{fragments/layouts/twoThirdsLayout :: twoThirdsLayout(~{::#page-contents/content()})}">
            <h1 class="govuk-heading-l" th:text="#{deregisterProperty.info.heading(${address})}">
                deregisterProperty.info.heading
            </h1>
            <p class="govuk-body" th:text="#{deregisterProperty.info.body}">
                deregisterProperty.info.body
            </p>
            <h2 class="govuk-heading-m" th:text="#{deregisterProperty.info.prnHeading}">
                deregisterProperty.info.prnHeading
            </h2>
            <p class="govuk-body" th:text="#{deregisterProperty.info.prn.paragraph.one}">
                deregisterProperty.info.prn.paragraph.one
            </p>
            <p class="govuk-body" th:text="#{deregisterProperty.info.prn.paragraph.two}">
                deregisterProperty.info.prn.paragraph.two
            </p>
            <form th:action="@{''}" method="post" novalidate>
                <div class="govuk-button-group">
                    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.continue})}"></button>
                    <a th:href="@{${backUrl}}" class="govuk-link" th:text="#{deregisterProperty.info.cancelLink}">
                        deregisterProperty.info.cancelLink
                    </a>
                </div>
            </form>
        </div>
    </main>
    </th:block>
</html>
