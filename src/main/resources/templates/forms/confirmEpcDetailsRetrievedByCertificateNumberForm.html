<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="summaryCardTitle" type="java.lang.String"*/-->
<!--/*@thymesVar id="summaryCardActions" type="java.util.List"*/-->
<!--/*@thymesVar id="summaryListRows" type="java.util.List"*/-->
<!--/*@thymesVar id="radioOptions" type="java.util.List"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/complexQuestionPage :: complexQuestionPage(#{${title}}, ${formModel}, ~{::#form-content}, ~{::#question-content}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block id="question-content">
        <h1 class="govuk-heading-l" th:text="#{propertyCompliance.epcTask.confirmEpcDetailsFromCertificateNumber.heading}">
            propertyCompliance.epcTask.confirmEpcDetailsFromCertificateNumber.heading
        </h1>
        <div th:replace="~{fragments/summaryCard :: summaryCard(${summaryCardTitle}, null, ${summaryCardActions}, ${summaryListRows})}"></div>
    </th:block>
    <th:block id="form-content">
        <th:block id="fieldset-content"
                  th:replace="~{fragments/forms/minorFieldSet :: minorFieldSet(~{::#fieldset-content/content()}, 'matchedEpcIsCorrect', #{propertyCompliance.epcTask.confirmEpcDetailsFromCertificateNumber.question.heading}, null)}">
            <th:block th:replace="~{fragments/forms/radios :: radios(null, 'matchedEpcIsCorrect', null, ${radioOptions})}"></th:block>
        </th:block>
        <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.saveAndContinue})}"></button>
    </th:block>
</html>
