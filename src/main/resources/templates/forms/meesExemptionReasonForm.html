<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="radioOptions" type="java.lang.Object"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content/content()}, ${backUrl}, ${sectionHeaderInfo})}">
<div id="form-content">
    <div class="govuk-form-group" th:classappend="${#fields.hasAnyErrors()} ? 'govuk-form-group--error'">
        <fieldset class="govuk-fieldset"
                  th:attr="aria-describedby=|exemptionReason-hint${#fields.hasAnyErrors() ? ' exemptionReason-error' : ''}|">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                <h1 class="govuk-fieldset__heading" th:text="#{propertyCompliance.epcTask.meesExemptionReason.heading}">propertyCompliance.epcTask.meesExemptionReason.heading</h1>
            </legend>
            <div id="exemptionReason-hint" class="govuk-hint" th:utext="#{propertyCompliance.epcTask.meesExemptionReason.hint}">propertyCompliance.epcTask.meesExemptionReason.hint</div>
            <div th:replace="~{fragments/forms/radios :: radios(null, 'exemptionReason', null, ${radioOptions})}"></div>
        </fieldset>
    </div>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.saveAndContinue})}"></button>
</div>
</html>
