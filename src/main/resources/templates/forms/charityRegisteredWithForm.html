<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="fieldSetHeading" type="java.lang.String"*/-->
<!--/*@thymesVar id="detailsSummary" type="java.lang.String"*/-->
<!--/*@thymesVar id="detailsText" type="java.lang.String"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="radioOptions" type="java.lang.Object"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="java.lang.Object"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content}, ${backUrl}, ${sectionHeaderInfo})}">
<th:block id="form-content">
    <fieldset id="fieldset-content"
              th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'charityRegisteredWith', #{${fieldSetHeading}}, null)}">
        <details id="details" th:replace="~{fragments/details :: details(#{${detailsSummary}}, ~{::#details/content()})}">
            <div class="govuk-details__text" th:text="#{${detailsText}}"></div>
        </details>
        <input th:replace="~{fragments/forms/radios :: radios(null,'charityRegisteredWith',null, ${radioOptions})}">
    </fieldset>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.continue})}"></button>
</th:block>
</html>
