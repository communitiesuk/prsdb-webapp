<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="java.lang.Object"*/-->
<!--/*@thymesVar id="fieldSetHeading" type="java.lang.String"*/-->
<!--/*@thymesVar id="nameLabel" type="java.lang.String"*/-->
<!--/*@thymesVar id="emailLabel" type="java.lang.String"*/-->
<!--/*@thymesVar id="phoneNumberLabel" type="java.lang.String"*/-->
<!--/*@thymesVar id="submitButtonText" type="java.lang.String"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content}, ${backUrl}, ${sectionHeaderInfo})}">
<th:block id="form-content">
    <th:block id="fieldset-content"
              th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'mainContact', #{${fieldSetHeading}}, null)}">
        <div th:replace="~{fragments/forms/basicTextInput :: textInput(#{${nameLabel}}, 'name', null)}"></div>
        <div th:replace="~{fragments/forms/emailInput :: emailInput(#{${emailLabel}}, 'emailAddress', null)}"></div>
        <div th:replace="~{fragments/forms/phoneNumberInput :: phoneNumberInput(#{${phoneNumberLabel}}, 'phoneNumber', null)}"></div>
    </th:block>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{${submitButtonText}})}"></button>
</th:block>
</html>
