<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="getNewEpcUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="prsExemptionGuideUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="submitButtonText" type="java.lang.String"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/complexQuestionPage :: complexQuestionPage(#{${title}}, ${formModel}, ~{::#form-content}, ~{::#question-content}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block id="question-content">
        <header>
            <span class="govuk-caption-l" th:text="#{forms.lowEnergyRatingOccupied.caption}">forms.lowEnergyRatingOccupied.caption</span>
            <h1 class="govuk-heading-l" th:text="#{forms.lowEnergyRatingOccupied.heading}">forms.lowEnergyRatingOccupied.heading</h1>
        </header>
        <section>
            <p class="govuk-body">
                <span th:remove="tag" th:text="#{forms.lowEnergyRatingOccupied.paragraph.one.beforeBold}">forms.lowEnergyRatingOccupied.paragraph.one.beforeBold</span>
                <strong th:text="#{forms.lowEnergyRatingOccupied.paragraph.one.bold}">forms.lowEnergyRatingOccupied.paragraph.one.bold</strong>
                <span th:remove="tag" th:text="#{forms.lowEnergyRatingOccupied.paragraph.one.afterBold}">forms.lowEnergyRatingOccupied.paragraph.one.afterBold</span>
            </p>
        </section>
        <section th:replace="~{fragments/content/epcRequirementsContent :: epcRequirementsContent(${getNewEpcUrl}, ${prsExemptionGuideUrl})}"></section>
        <section>
            <h2 class="govuk-heading-m" th:text="#{forms.lowEnergyRatingOccupied.breakingLaw.heading}">forms.lowEnergyRatingOccupied.breakingLaw.heading</h2>
            <div th:replace="~{fragments/warningText :: warningText(#{forms.lowEnergyRatingOccupied.warning})}"></div>
        </section>
    </th:block>
    <th:block id="form-content">
        <button th:replace="~{fragments/buttons/secondaryButton :: secondaryButton(#{${submitButtonText}})}"></button>
    </th:block>
</html>
