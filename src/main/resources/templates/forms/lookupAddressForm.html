<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="fieldSetHeading" type="java.lang.String"*/-->
<!--/*@thymesVar id="fieldSetHint" type="java.lang.String"*/-->
<!--/*@thymesVar id="postcodeLabel" type="java.lang.String"*/-->
<!--/*@thymesVar id="postcodeHint" type="java.lang.String"*/-->
<!--/*@thymesVar id="postcodeFieldWidth" type="java.lang.Integer"*/-->
<!--/*@thymesVar id="houseNameOrNumberLabel" type="java.lang.String"*/-->
<!--/*@thymesVar id="houseNameOrNumberHint" type="java.lang.String"*/-->
<!--/*@thymesVar id="houseNameOrNumberFieldWidth" type="java.lang.Integer"*/-->
<!--/*@thymesVar id="submitButtonText" type="java.lang.String"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="alternativeActionUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="alternativeActionText" type="java.lang.String"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content}, ${backUrl}, ${sectionHeaderInfo})}">
<th:block id="form-content">
    <th:block id="fieldset-content"
              th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'lookupAddress',
                            #{${fieldSetHeading}}, ${fieldSetHint != null ? #messages.msg(fieldSetHint) : null})}">
        <div th:if="${postcodeFieldWidth != null}" th:replace="~{fragments/forms/fixedWidthTextInput :: fixedWidthTextInput(#{${postcodeLabel}}, 'postcode', #{${postcodeHint}}, ${postcodeFieldWidth})}"></div>
        <div th:if="${postcodeFieldWidth == null}" th:replace="~{fragments/forms/basicTextInput :: textInput(#{${postcodeLabel}}, 'postcode', #{${postcodeHint}})}"></div>
        <div th:if="${houseNameOrNumberFieldWidth != null}" th:replace="~{fragments/forms/fixedWidthTextInput :: fixedWidthTextInput(#{${houseNameOrNumberLabel}}, 'houseNameOrNumber', #{${houseNameOrNumberHint}}, ${houseNameOrNumberFieldWidth})}"></div>
        <div th:if="${houseNameOrNumberFieldWidth == null}" th:replace="~{fragments/forms/basicTextInput :: textInput(#{${houseNameOrNumberLabel}}, 'houseNameOrNumber', #{${houseNameOrNumberHint}})}"></div>
    </th:block>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{${submitButtonText}})}"></button>
    <p th:if="${alternativeActionText != null}" class="govuk-body">
        <a class="govuk-link" th:href="@{${alternativeActionUrl}(journeyState=${param.journeyState})}" th:text="#{${alternativeActionText}}"></a>
    </p>
</th:block>
</html>
