<!DOCTYPE html>
<html>
<th:block id="main-content"
          th:replace="~{fragments/layout :: layout(#{leaveProperty.title}, ~{::#main-content/content()}, false)}">
    <a href="#" th:replace="~{fragments/forms/backLink :: backLink(${backUrl})}">Back link</a>
    <main class="govuk-main-wrapper" id="main-content">
        <div id="page-contents"
             th:replace="~{fragments/layouts/twoThirdsLayout :: twoThirdsLayout(~{::#page-contents/content()})}">
            <h1 class="govuk-heading-l" th:text="#{leaveProperty.confirm.heading(${address})}">
                leaveProperty.confirm.heading
            </h1>
            <p class="govuk-body" th:text="#{leaveProperty.confirm.body}">
                leaveProperty.confirm.body
            </p>
            <p class="govuk-body" th:text="#{leaveProperty.confirm.reasonsIntro}">
                leaveProperty.confirm.reasonsIntro
            </p>
            <ul class="govuk-list govuk-list--bullet">
                <li th:text="#{leaveProperty.confirm.reason.one}">leaveProperty.confirm.reason.one</li>
                <li th:text="#{leaveProperty.confirm.reason.two}">leaveProperty.confirm.reason.two</li>
            </ul>
            <p class="govuk-body" th:text="#{leaveProperty.confirm.councilNote}">
                leaveProperty.confirm.councilNote
            </p>
            <div th:replace="~{fragments/warningText :: warningText(#{leaveProperty.confirm.warning})}"></div>
            <form th:action="@{''}" method="post" novalidate>
                <div class="govuk-button-group">
                    <button th:replace="~{fragments/buttons/warningButton :: warningButton(#{leaveProperty.confirm.confirmButton})}"></button>
                    <a th:href="@{${cancelLinkUrl}}" class="govuk-link" th:text="#{leaveProperty.confirm.cancelLink}">
                        leaveProperty.confirm.cancelLink
                    </a>
                </div>
            </form>
        </div>
    </main>
</th:block>
</html>
