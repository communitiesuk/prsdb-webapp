<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="summaryText" type="java.lang.String"*/-->
<!--/*@thymesVar id="summaryListData" type="java.lang.Object"*/-->
<!--/*@thymesVar id="showWarning" type="java.lang.Boolean"*/-->
<!--/*@thymesVar id="submittedFilteredJourneyData" type="java.lang.String"*/-->
<!--/*@thymesVar id="addAnotherButtonText" type="java.lang.String"*/-->
<!--/*@thymesVar id="submitButtonText" type="java.lang.String"*/-->
<!--/*@thymesVar id="insetText" type="java.lang.String"*/-->
<!--/*@thymesVar id="addAnotherUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="addAnotherTitle" type="java.lang.String"*/-->
<!--/*@thymesVar id="optionalAddAnotherTitleParam" type="java.lang.Int"*/-->

<!DOCTYPE html>
<html th:replace="~{fragments/forms/complexQuestionPage :: complexQuestionPage(#{${title}}, ${formModel}, ~{::#form-content}, ~{::#question-content}, ${backUrl}, ${sectionHeaderInfo})}">
<th:block id="question-content">
    <h1 class="govuk-heading-l"
        th:text="#{${addAnotherTitle}(${optionalAddAnotherTitleParam})}">
    </h1>
    <p class="govuk-inset-text" th:text="#{${summaryText}}" id="summary-text">summaryText</p>
    <table th:replace="~{fragments/tables/table :: table(
                            ${ {'uploads.checkUploads.fileName',
                            'uploads.checkUploads.status',
                            null} },
                            ~{::tbody},
                            null
                        )}">
        <tbody class="govuk-table__body">
            <tr class="govuk_table__row" th:each="upload: ${uploadRows}">
                <td class="govuk-table__cell govuk-!-width-one-third">
                    <a class="govuk-link" th:if="${upload.downloadUrl} != null" th:href="@{${upload.downloadUrl}}" th:text="${upload.fileName}"></a>
                    <span th:unless="${upload.downloadUrl} != null" th:text="${upload.fileName}"></span>
                </td>
                <td class="govuk-table__cell govuk-!-width-one-third" th:text="#{${upload.status}}"></td>
                <td class="govuk-table__cell govuk-!-width-one-third">
                    <a class="govuk-link" th:href="@{${upload.removeUrl}}" th:text="#{forms.links.remove}"></a>
                </td>
        </tbody>
    </table>
    <th:block th:if="${showWarning}">
        <div th:replace="~{fragments/warningText :: warningText(#{forms.warning})}">forms.warning</div>
    </th:block>
</th:block>
<th:block id="form-content">
    <input type="hidden" name="submittedFilteredJourneyData" th:value="${submittedFilteredJourneyData}"/>
    <div class="govuk-button-group">
        <div>
            <a th:replace="~{fragments/buttons/secondaryButtonLink :: secondaryButtonLink(${addAnotherUrl}, #{${addAnotherButtonText}})}">
                landlord.dashboard.viewLandlordRecord.button
            </a>
        </div>
        <div class="govuk-!-margin-top-2">
            <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{${submitButtonText}})}"></button>
        </div>
    </div>
</th:block>
</html>
