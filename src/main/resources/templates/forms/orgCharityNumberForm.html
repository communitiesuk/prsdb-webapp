<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="java.lang.Object"*/-->
<!--/*@thymesVar id="charityUrl" type="java.lang.String"*/-->
<!DOCTYPE html>
<html id="form-content" th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content/content()}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block th:with="fieldSetHeadingLabelTo=${'charityNumber'}">
        <th:block id="fieldset-content" th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'charityNumber', #{forms.orgCharityNumber.fieldSetHeading}, #{forms.orgCharityNumber.fieldSetHint})}">
            <div th:replace="~{fragments/forms/basicTextInput :: textInput(null, 'charityNumber', null)}"></div>
        </th:block>
    </th:block>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.continue})}"></button>
    <h2 class="govuk-heading-s" th:text="#{forms.orgCharityNumber.bodyHeading}">forms.orgCharityNumber.bodyHeading</h2>
    <p class="govuk-body">
        <span th:remove="tag" th:text="#{forms.orgCharityNumber.bodyText.beforeLink}">forms.orgCharityNumber.bodyText.beforeLink</span>
        <a class="govuk-link" th:text="#{forms.orgCharityNumber.bodyText.link}" th:href="${charityUrl}" rel="noreferrer noopener" target="_blank">forms.orgCharityNumber.bodyText.link</a><span th:remove="tag" th:text="#{forms.orgCharityNumber.bodyText.afterLink}">forms.orgCharityNumber.bodyText.afterLink</span>
    </p>
</html>
