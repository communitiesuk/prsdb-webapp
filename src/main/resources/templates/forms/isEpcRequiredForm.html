<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="radioOptions" type="uk.gov.communities.prsdb.webapp.models.viewModels.formModels.RadiosViewModel"*/-->
<!--/*@thymesVar id="fieldSetHeading" type="java.lang.String"*/-->
<!--/*@thymesVar id="epcNotRequiredUrl" type="java.lang.String"*/-->
<!DOCTYPE html>
<html id="form-content" th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content/content()}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block id="form-content">
        <th:block id="fieldset-content" th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'epcRequired', #{${fieldSetHeading}}, null)}">
            <p class="govuk-body">
                <span th:remove="tag" th:text="#{propertyCompliance.epcTask.isEpcRequired.paragraph.beforeLink}"></span>
                <a class="govuk-link"
                   th:text="#{propertyCompliance.epcTask.isEpcRequired.paragraph.link}"
                   th:href="${epcNotRequiredUrl}"
                   rel="noreferrer noopener"
                   target="_blank"></a>
                <span th:remove="tag" th:text="#{propertyCompliance.epcTask.isEpcRequired.paragraph.afterLink}"></span>
            </p>
            <th:block th:replace="~{fragments/forms/radios :: radios(null, 'epcRequired', null, ${radioOptions})}"></th:block>
        </th:block>
        <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{forms.buttons.saveAndContinue})}"></button>
    </th:block>
</html>
