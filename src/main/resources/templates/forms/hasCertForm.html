<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="uk.gov.communities.prsdb.webapp.models.viewModels.SectionHeaderViewModel"*/-->
<!--/*@thymesVar id="radioOptions" type="uk.gov.communities.prsdb.webapp.models.viewModels.formModels.RadiosViewModel"*/-->
<!DOCTYPE html>
<html th:replace="~{fragments/forms/complexQuestionPage :: complexQuestionPage(#{${title}}, ${formModel}, ~{::#form-content}, ~{::#question-content}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block id="question-content">
        <header>
            <h1 class="govuk-heading-l" th:text="#{propertyCompliance.gasSafetyTask.gasCert.heading}">forms.hasCert.heading</h1>
        </header>
        <p class="govuk-body" th:text="#{propertyCompliance.gasSafetyTask.gasCert.hint}">forms.hasCert.hint</p>
    </th:block>
    <th:block id="form-content">
        <th:block th:replace="~{fragments/forms/radios :: radios(null, 'hasCert', null, ${radioOptions})}"></th:block>
        <div class="govuk-button-group">
            <button th:replace="~{fragments/buttons/namedPrimaryButton :: namedPrimaryButton(#{forms.buttons.saveAndContinue}, 'action', 'saveAndContinue')}"></button>
            <button th:replace="~{fragments/buttons/namedSecondaryButton :: namedSecondaryButton(#{forms.buttons.provideThisLater}, 'action', 'provideThisLater')}"></button>
        </div>
    </th:block>
</html>
