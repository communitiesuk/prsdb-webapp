<!--/*@thymesVar id="title" type="java.lang.String"*/-->
<!--/*@thymesVar id="formModel" type="java.lang.Object"*/-->
<!--/*@thymesVar id="backUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="sectionHeaderInfo" type="java.lang.Object"*/-->
<!--/*@thymesVar id="fieldSetHeading" type="java.lang.String"*/-->
<!--/*@thymesVar id="hint" type="java.lang.String"*/-->
<!--/*@thymesVar id="companiesHouseRegisterUrl" type="java.lang.String"*/-->
<!--/*@thymesVar id="submitButtonText" type="java.lang.String"*/-->
<!DOCTYPE html>
<html id="form-content" th:replace="~{fragments/forms/questionPage :: questionPage(#{${title}}, ${formModel}, ~{::#form-content/content()}, ${backUrl}, ${sectionHeaderInfo})}">
    <th:block id="fieldset-content" th:replace="~{fragments/forms/fieldSet :: fieldSet(~{::#fieldset-content/content()}, 'companyNumber', #{${fieldSetHeading}}, null)}">
        <div th:replace="~{fragments/forms/fixedWidthTextInput :: fixedWidthTextInput(null, 'companyNumber', #{${hint}}, 10)}"></div>
    </th:block>
    <button th:replace="~{fragments/buttons/primaryButton :: primaryButton(#{${submitButtonText}})}"></button>
    <h2 class="govuk-heading-s" th:text="#{forms.orgCompanyNumber.whereToFind.header}">forms.orgCompanyNumber.whereToFind.header</h2>
    <p class="govuk-body">
        <span th:remove="tag" th:text="#{forms.orgCompanyNumber.whereToFind.beforeLink}">forms.orgCompanyNumber.whereToFind.beforeLink</span>
        <a class="govuk-link" th:href="${companiesHouseRegisterUrl}" rel="noreferrer noopener" target="_blank" th:text="#{forms.orgCompanyNumber.whereToFind.linkText}">forms.orgCompanyNumber.whereToFind.linkText</a><span th:remove="tag" th:text="#{forms.orgCompanyNumber.whereToFind.afterLink}">forms.orgCompanyNumber.whereToFind.afterLink</span>
    </p>
</html>
