<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(#{registerLocalCouncilUser.title}, ~{::main}, false)}">
<main class="govuk-main-wrapper" id="main-content">
    <div id="page-contents"
         th:replace="~{fragments/layouts/twoThirdsLayout :: twoThirdsLayout(~{::#page-contents/content()})}">
        <div id="confirmation-banner"
             th:replace="~{fragments/banners/confirmationPageBanner :: confirmationPageBanner(#{registerLocalCouncilUser.success.banner.title(${localCouncil})}, ~{::#confirmation-banner/content()})}">
        </div>
        <p class="govuk-body" th:text="#{registerLocalCouncilUser.success.paragraph.one}">
            registerLocalCouncilUser.success.paragraph.one
        </p>
        <div class="govuk-button-group">
            <a th:replace="~{fragments/buttons/primaryButtonLink :: primaryButtonLink(@{${dashboardUrl}}, #{common.confirmationPage.goToDashboard})}">
                common.confirmationPage.goToDashboard
            </a>
        </div>
    </div>
</main>
</html>
