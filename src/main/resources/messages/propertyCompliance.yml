gasSafetyTask:
  gasSupply:
    heading: Does the property have a gas supply or any gas appliances?
    error:
      missing: Select whether you have a gas supply or any gas appliances
    detail:
      summary: What you should include
      gasSupply:
        heading: Gas supply
        text: Include any gas supply, even if it’s currently unused.
      gasAppliances:
        heading: Gas appliances
        intro: 'Gas appliances include any:'
        boilers: gas boilers (for heating or hot water)
        cookers: gas cookers or hobs
        fires: gas fires or heaters
        waterHeaters: gas water heaters
        other: other fixed or portable gas appliances
        exclusion: Do not include any portable gas appliances that use detachable gas bottles. For example, a barbecue or patio heater.
  gasCert:
    heading: Do you have a gas safety certificate for this property?
    hint: Rental properties must be checked by a Gas Safe engineer before a tenant can move in. They must then be checked every year.
    radios:
      yesHint: We’ll ask you to upload this now
  gasSafetyCertificateMissingOccupied:
    heading: You must get a valid gas safety certificate for this property
    warning: You could face prosecution if you have tenants in a property without a gas safety certificate.
    paragraph:
      one: You’ve told us this property is occupied by tenants.
      two: To keep tenants safe, rental properties must have a valid gas safety certificate. This needs to be renewed every 12 months.
      three: Without a valid gas safety certificate for this property, you are breaking the law. You should never let a property without one.
      four: 'Your local council or the Health and Safety Executive can take enforcement action, which can lead to:'
    bullet:
      one: prosecution
      two: unlimited fines
      three: 'imprisonment, in the most serious cases'
    readMore:
      beforeLink: Read more about
      link: gas safety for landlords (opens in new tab)
      afterLink: .
  gasSafetyCertificateMissingUnoccupied:
    heading: You must get a gas safety certificate before a tenant moves in
    learnHow:
      beforeLink: Learn how by reading
      link: gas safety for landlords (opens in new tab)
      afterLink: .
    whenToUpload:
      heading: When you must upload this certificate by
      paragraph: You must upload a gas safety certificate to this service within 28 days of a tenant moving in. If you get a certificate earlier, you can return and upload it.
  gasSafetyCertificateExpired:
    heading: This gas safety certificate has expired
    insetText: "You entered an issue date of <strong>{0}</strong>. This means the certificate has expired, as gas safety certificates are only valid for a year."
    changeIssueDate:
      link: Change the issue date
      afterLink: if you made a mistake.
    occupied:
      subHeading: You must get a valid gas safety certificate for this property
      warning: You could face prosecution if you have tenants in a property without a gas safety certificate.
      paragraph:
        one: You’ve told us this property is occupied by tenants.
        two: To keep tenants safe, rental properties must have a valid gas safety certificate. This needs to be renewed every 12 months.
        three: Without a valid gas safety certificate for this property, you are breaking the law. You should never let a property without one.
        four: 'Your local council or the Health and Safety Executive can take enforcement action, which can lead to:'
      bullet:
        one: prosecution
        two: unlimited fines
        three: 'imprisonment, in the most serious cases'
      readMore:
        beforeLink: Read more about
        link: gas safety for landlords (opens in new tab)
        afterLink: .
    unoccupied:
      whatToDoNext:
        heading: What to do next
        learnHow:
          beforeLink: You must get a gas safety certificate before a tenant moves in. Learn how by reading
          link: gas safety for landlords (opens in new tab)
          afterLink: .
      whenToUpload:
        heading: When you’ll need to upload your gas safety certificate
        paragraph: You can continue to finish your registration and get a Property Registration Number. However, you must return and add your gas safety certificate within 28 days of a tenant moving in.
  gasSafetyCertIssueDate:
    fieldSetHeading: What’s the issue date on the gas safety certificate?
    fieldSetHint: We’ll use this to calculate how long the certificate is valid for
  provideGasCertificateLater:
    title: Provide your gas safety certificate later
    heading: Provide your gas safety certificate later
    whenToUpload:
      heading: 'When you’ll need to upload your gas safety certificate'
    occupied:
      paragraph:
        one: 'You can continue now to get your Property Registration Number, but you’ll need to return later and upload your gas safety certificate.'
      whenToUpload:
        insetText: You must upload your gas safety certificate within 28 days.
        paragraph: 'To keep the property registered, we need all its compliance certificates within 28 days. This is because you’ve told us this property’s occupied by tenants.'
      readMore:
        beforeLink: Read more about
        link: gas safety for landlords (opens in new tab)
        afterLink: .
    unoccupied:
      paragraph:
        one: You must get a gas safety certificate before a tenant moves in.
      learnHow:
        beforeLink: Learn how by reading
        link: gas safety for landlords (opens in new tab)
        afterLink: .
      whenToUpload:
        paragraph: 'You can continue to finish your registration and get a Property Registration Number. However, you must return and add your gas safety certificate within 28 days of a tenant moving in.'
electricalSafetyTask:
  electricalCert:
    error:
      missing: Select which electrical safety certificate you have
    heading: Which electrical safety certificate do you have for this property?
    hint: You must check a rental property’s electrics every 5 years
    radios:
      eicLabel: Electrical Installation Certificate (EIC)
      eicHint: Issued when a property is built or rewired
      eicrLabel: Electrical Installation Condition Report (EICR)
      eicrHint: Issued after an electrician checks your existing electrics
      noneLabel: None of the above
      divider: or
  electricalSafetyCertificateMissingOccupied:
    heading: You must get a valid electrical safety certificate for this property
    warning: You could face prosecution if you have tenants in a property without an electrical safety certificate.
    paragraph:
      one: You’ve told us this property is occupied by tenants.
      two: To keep tenants safe, rental properties must have a valid electrical safety certificate. This needs to be renewed every five years.
      three: Without a valid electrical safety certificate for this property, you are breaking the law. You should never let a property without one.
      four: 'Your local council can take enforcement action. They can:'
    bullet:
      one: order you to fix any electrical problems
      two: do remedial work on your property and charge you for it
      three: fine you up to £30,000
    readMore:
      beforeLink: Read more about
      link: electrical safety standards in rental properties (opens in new tab)
      afterLink: .
  electricalSafetyCertificateMissingUnoccupied:
    heading: You must get an electrical safety certificate before a tenant moves in
    learnHow:
      beforeLink: Learn how by reading
      link: electrical safety standards for rented properties (opens in new tab)
      afterLink: .
    whenToUpload:
      heading: You must upload an electrical safety certificate to this service
      paragraph: You can continue to finish your registration, but you must return and upload an electrical safety certificate within 28 days of a tenant moving in.
  provideElectricalCertLaterOccupied:
    heading: Provide your electrical safety certificate later
    paragraph:
      one: You can continue and submit your registration now, but you’ll need to return later and upload your electrical safety certificate.
    whenToAdd:
      heading: 'When you’ll need to add your electrical safety certificate'
      insetText: You must upload your electrical safety certificate within 28 days.
      paragraph: 'To keep the property registered, we need all its compliance certificates within 28 days. This is because you’ve told us this property’s occupied by tenants.'
    readMore:
      beforeLink: Read more about
      link: electrical safety standards for rented properties (opens in new tab)
      afterLink: .
  provideElectricalCertLaterUnoccupied:
    heading: Provide your electrical safety certificate later
    paragraph:
      one: You must get an electrical safety certificate before a tenant moves in.
    learnHow:
      beforeLink: Learn how by reading
      link: electrical safety standards for rented properties (opens in new tab)
      afterLink: .
    whenToAdd:
      heading: 'When you’ll need to add your electrical safety certificate'
      paragraph: 'You can continue to finish your registration and get a Property Registration Number. However, you must return and add your electrical safety certificate within 28 days of a tenant moving in.'
  electricalCertExpiryDate:
    eicr:
      fieldSetHeading: What’s the expiry date on the Electrical Installation Condition Report?
    eic:
      fieldSetHeading: What’s the expiry date on the Electrical Installation Certificate?
  electricalCertificateExpired:
    title: This electrical safety certificate has expired
    heading: This electrical safety certificate has expired
    expiryDateParagraph: "You’ve told us this certificate expired on <strong>{0}</strong>."
    changeExpiryDate:
      link: Change the expiry date
      afterLink: " if you entered it incorrectly."
    occupied:
      noValidCertParagraph: This means there’s no valid electrical safety certificate for this property.
      subHeading: You must get a valid electrical safety certificate for this property
      warning: "You could face prosecution if you have tenants in a property without an electrical safety certificate."
      paragraph:
        one: You’ve told us this property is occupied by tenants.
        two: To keep tenants safe, rental properties must have a valid electrical safety certificate. This needs to be renewed every five years.
        three: "Without a valid electrical safety certificate for this property, you are breaking the law. You should never let a property without one."
        four: "Your local council can take enforcement action. They can:"
      bullet:
        one: order you to fix any electrical problems
        two: do remedial work on your property and charge you for it
        three: fine you up to £30,000
      readMore:
        beforeLink: Read more about
        link: electrical safety standards in rental properties (opens in new tab)
        afterLink: .
    unoccupied:
      mustGetCertParagraph: This means you must get an in-date electrical safety certificate before a tenant moves in.
      whatToDoNext:
        heading: What to do next
        learnHow:
          beforeLink: Learn how to get a new electrical safety certificate by reading
          link: electrical safety standards for rented properties (opens in new tab)
          afterLink: .
      mustUpload:
        heading: You must upload an electrical safety certificate to this service
        paragraph: You can continue to finish your registration, but you must return and upload an electrical safety certificate within 28 days of a tenant moving in.
epcTask:
  confirmEpcDetailsFromUprn:
    error:
      missing: Select if you want to use the EPC we found for your property
    heading: Check this EPC
    paragraph: 'We found this EPC for your property:'
    summaryCard:
      title: EPC linked to your property
      action: View full EPC (opens in new tab)
    summaryList:
      address:
        heading: Address
      energyRating:
        heading: Energy efficiency rating
      expiryDate:
        heading: Expiry date
      certificateNumber:
        heading: Certificate number
    question: Do you want to use the EPC we found for your property?
    details:
      heading: EPC requirements
      forAdvertising:
        heading: For advertising a property
        paragraph: You need a valid EPC (unless your property is exempt from needing an EPC, for example, listed and work would unacceptably alter the character of the building).
      toLet:
        heading: To let a property (new tenancy)
        paragraph: 'You need a <strong>valid EPC of E or higher</strong>, unless:'
        bullets:
          one: your property is exempt from needing an EPC, for example, listed and work would unacceptably alter the character of the building
          two: you have a registered energy efficiency exemption on the PRS exemptions register (but you still need a valid EPC)
        expiryParagraph: If the EPC expires while the property’s occupied, you do not need to get a new EPC immediately. You only need a new EPC when you advertise the property or start a new tenancy.
      lowerThanE:
        heading: If you have an EPC lower than E
        paragraphs:
          one: Rental properties can be let with a rating below E if they have a registered energy efficiency exemption.
          two: If you provide us with an EPC below E, we’ll ask you which exemption you’ve registered for this property.
        link: When you can register an exemption (opens in new tab)
      noEpcNeeded:
        heading: Properties that do not need an EPC at all
        paragraph: Some properties do not need an EPC at all. This includes some listed buildings or properties within a conservation area.
        link: When you do not need an EPC (opens in new tab)
    radios:
      'no':
        label: 'No (use a different EPC or the property does not need one)'
  epcSuperseded:
    heading: There’s a newer EPC for this property
    subtitle: The EPC you entered is not the most recent one for this property.
    supersededEpc:
      heading: EPC you entered
      explanation: You cannot use this EPC since there’s a newer one.
      address: Address
      energyRating: Energy rating
      expiryDate: Expiry date
      certificateNumber: Certificate number
    latestEpc:
      heading: Most recent EPC for this property
      address: Address
      energyRating: Energy rating
      expiryDate: Expiry date
      certificateNumber: Certificate number
      viewFullEpc: View full EPC (opens in new tab)
    buttons:
      continueWithLatest: Continue with most recent EPC
      searchAgain: Search by certificate number again
  epcInDateAtStartOfTenancy:
    missing: Select if the EPC was still in date when the current tenancy began
    heading: Confirm when the current tenancy began
    paragraph:
      one: 'This EPC expired on <strong>{0,,expiryDate}</strong>.'
      two: You can continue a tenancy with an expired EPC. It only matters that the EPC was valid when the current tenancy began.
    fieldSetHeading: Was the EPC still in date when the current tenancy began?
    'yes':
      hint: 'The current tenancy started on or before {0,,expiryDate}'
  hasEpc:
    error:
      missing: Select if you have an EPC for this property
    fieldSetHeading: Do you have an EPC for this property?
    buttons:
      provideEpcDetailsLater: Provide EPC details later
    radios:
      option:
        'no':
          label: 'No (for example, the property does not require an EPC to be let)'
    epcRequirements:
      summary: EPC requirements
      advertising:
        heading: For advertising a property
        paragraph: You need a valid EPC (unless your property is exempt from needing an EPC, for example,
          listed and work would unacceptably alter the character of the building).
      toLet:
        heading: To let a property (new tenancy)
        paragraph:
          one: 'You need a <strong>valid EPC of E or higher</strong>, unless:'
          two: If the EPC expires while the property’s occupied, you do not need to get a new EPC
            immediately. You only need a new EPC when you advertise the property or start a new tenancy.
        bullet:
          one: your property is exempt from needing an EPC, for example, listed and work would
            unacceptably alter the character of the building
          two: you have a registered energy efficiency exemption on the PRS exemptions register
            (but you still need a valid EPC)
      lowRating:
        heading: If you have an EPC lower than E
        paragraph:
          one: Rental properties can be let with a rating below E if they have a registered
            energy efficiency exemption.
          two: If you provide us with an EPC below E, we’ll ask you which exemption you’ve
            registered for this property.
        link: When you can register an exemption (opens in new tab)
      notRequired:
        heading: Properties that do not need an EPC at all
        paragraph: Some properties do not need an EPC at all. This includes some listed buildings
          or properties within a conservation area.
        link: When you do not need an EPC (opens in new tab)
  isEpcRequired:
    error:
      missing: Select if an EPC is required to let this property
    fieldSetHeading: Is an EPC required to let this property?
    paragraph:
      beforeLink: "Most rental properties need an EPC, but there are "
      link: "situations when an EPC is not required (opens in new tab)"
      afterLink: "."
  epcExemption:
    error:
      missing: Select why this property does not need an EPC to be let
    fieldSetHeading: Why does this property not need an EPC to be let?
    radios:
      protectedArchitecturalOrHistoricalMerit:
        label: It has protected architectural or historical merit
        hint: Meeting energy efficiency requirements would unacceptably alter this property’s character or appearance
      standaloneSmallBuilding:
        label: It’s smaller than 50 metres squared
        hint: Only applies for detached buildings
      dueForDemolition:
        label: It will be demolished or redeveloped soon
        hint: Your council may ask for proof
      temporaryBuilding:
        label: It’s a temporary building
        hint: It’ll be used for 2 years or less
      annualUseLessThan4Months:
        label: "It’ll be let for less than 4 months a year (or for a period when it’ll use less than 25% of its expected annual energy usage)"
  findYourEpc:
    error:
      missing: Enter a certificate number
    fieldSetHeading: Find your EPC
    certificateNumber:
      label: Certificate number
      hint: For example, 9002-3775-9101-5482-3149
    searchButton:
      text: Search
    explanation:
      heading: How to find your EPC’s certificate number
      paragraph:
        one: You can find this number on your digital EPC.
        two:
          beforeLink: Go to
          link: Find an energy certificate (opens in a new tab)
          afterLink: where you can find your digital EPC using your postcode or address.
  confirmEpcDetailsFromCertificateNumber:
    error:
      missing: Select if you want to use this EPC
    heading: Confirm your EPC
    summaryCard:
      title: EPC you entered
      viewFullEpc: View full EPC (opens in new tab)
      address: Address
      energyEfficiencyRating: Energy efficiency rating
      expiryDate: Expiry date
      certificateNumber: Certificate number
    question:
      heading: Do you want to use this EPC?
    radios:
      'no':
        label: 'No, search again'
  noEpcFound:
    heading: We could not find your EPC
    paragraph:
      one:
        beforeBold: We could not find an EPC with a certificate number of
        afterBold: '.'
      two:
        beforeLink: 'Check the certificate number and '
        link: search again
        afterLink: '.'
  meesExemptionCheck:
    error:
      missing: Select if you have a registered energy efficiency exemption for this property
    heading: You need a registered energy efficiency exemption to let this property
    paragraph:
      one: 'This is because the property has an energy efficiency rating <strong>below E</strong>.'
      two:
        beforeLink: Learn how to register an exemption by reading
        link: guidance for landlords about minimum energy efficiency standards (opens in new tab)
    doesThePropertyHaveAnExemption:
      heading: Do you have a registered energy efficiency exemption for this property?
      radios:
        option:
          'yes':
            hint: We’ll ask which exemption you’ve registered for this property
  meesExemptionReason:
    error:
      missing: Select the energy efficiency exemption you registered for this property
    heading: Which energy efficiency exemption did you register for this property?
    hint: 'Select the exemption you registered on the <strong>PRS exemptions register</strong>'
    radios:
      allImprovementsMade:
        label: ‘All relevant improvements made’ exemption
      highCost:
        label: ‘High cost’ exemption
      wallInsulation:
        label: Wall insulation exemption
      thirdPartyConsent:
        label: Third-party consent exemption
      propertyDevaluation:
        label: Property devaluation exemption
      newLandlord:
        label: Temporary exemption due to recently becoming a landlord
  lowEnergyRatingOccupied:
    heading: This property does not meet energy efficiency requirements for letting
    paragraph:
      one: 'This property has an EPC with an energy efficiency rating <strong>lower than E</strong>. You’ve also told us there’s no registered energy efficiency exemption.'
    breakingLaw:
      heading: You’re breaking the law if tenants are living in this property
    warning: You can be fined for letting a property that does not meet energy efficiency requirements.
  lowEnergyRatingUnoccupied:
    heading: You’ll need to get a new EPC before letting this property
    insetText: You can use your current EPC to market this property, but you’ll need a new one before a tenant can move in.
    reasonList:
      intro: 'This is because this property has:'
      bullet:
        one: 'an EPC with an energy efficiency rating <strong>lower than E</strong>'
        two: no registered energy efficiency exemption.
    whatHappensNext:
      heading: What happens next
      paragraph:
        one: We will not save your current EPC. Instead, you must return when the property’s occupied. We’ll ask if you have an EPC that meet the requirements for letting.
        two: You must do this within 28 days of the property being occupied by tenants.
  provideEpcLaterOccupied:
    heading: Provide your EPC details later
    paragraph:
      one: You can continue and submit your registration now, but you’ll need to return later and confirm your EPC.
    whenToAdd:
      heading: When you’ll need to add your EPC details
      insetText: To keep the property registered, we need all its compliance certificates within 28 days.
      paragraph: This is because you’ve told us this property is occupied by tenants.
  provideEpcLaterUnoccupied:
    heading: Provide your EPC details later
    paragraph:
      one: You need a valid EPC before advertising a rental property.
    getNewEpcCertificate:
      link: Get a new energy certificate (opens in new tab)
    whenToAdd:
      heading: When you’ll need to add your EPC
      paragraph: You can continue to finish your registration now and get a Property Registration Number. However, you must return and add your EPC within 28 days of a tenant moving in.
  epcMissing:
    heading: Your property is missing an EPC
    paragraph:
      one: Based on what you've told us, you need an EPC to let this property.
    requirements:
      paragraph:
        one: 'You need a valid EPC with a rating of <strong>E or higher</strong> to let a property. This means you may need to:'
  epcMissingOccupied:
    breakingLaw:
      heading: You’re breaking the law if tenants are living in this property
    warning: You can be fined for letting a property that does not meet energy efficiency requirements.
  epcMissingUnoccupied:
    epcRequirements:
      heading: EPC requirements
      forAdvertising:
        heading: For advertising a property
        paragraph: You must get a valid EPC before advertising this property.
        link: Get a new energy certificate (opens in new tab)
      forLetting:
        heading: For letting a property
        paragraph: 'You must get a valid EPC with a rating of <strong>E or higher</strong> before letting this property.'
    whatYouNeedToDo:
      heading: What you need to do
      paragraph:
        one: You can continue and submit your registration, but you must return later
          when the property’s occupied. We'll ask if you have an EPC that meets the
          requirements for letting.
        two: You must do this within 28 days of the property being occupied by tenants.
  epcExpired:
    heading: This property’s EPC has expired
    occupied:
      paragraph:
        one: 'This EPC expired on <strong>{0,,expiryDate}</strong>. This means you did not have a valid EPC when the current tenancy started.'
    unoccupied:
      paragraph:
        one: 'This EPC expired on <strong>{0,,expiryDate}</strong>.'
    requirements:
      paragraph:
        one: 'You need a valid EPC with a rating of <strong>E or higher</strong>. This means you may need to:'
    epcRequirements:
      forLetting:
        paragraph: 'You must get a valid EPC with a rating of <strong>E or higher</strong> before letting this property.'
  checkEpcAnswers:
    heading: Energy performance certificate (EPC)
    epc:
      yourEpc: Your EPC
      viewFullEpc: View full EPC (opens in new tab)
      address: Address
      energyRating: Energy efficiency rating
      expiryDate: Expiry date
      certificateNumber: Certificate number
      expired: This EPC has expired.
      lowRating: 'This property has an energy efficiency rating <strong>below E</strong>.'
      meetsRequirements: This EPC meets the energy efficiency requirements for rental properties.
      tenancyStartCheck: Was the EPC still in date when the current tenancy began?
      meesExemptionCheck: Do you have a registered energy efficiency exemption for this property?
      meesExemption: Registered exemption
      lowRatingOccupiedInset: "The council can see that there is no valid EPC, even though this property’s occupied."
    hasEpc:
      label: Do you have an EPC for this property?
      provideEpcLaterOccupied: Provide EPC details later
      provideEpcLaterUnoccupied: Provide EPC details later (within 28 days of the property being occupied)
    isEpcRequired: Is an EPC required to let this property?
    epcExemption: Why does this property not need an EPC?
    occupiedNoEpcInset: "The council will see that there’s no valid EPC, even though the property’s occupied."
