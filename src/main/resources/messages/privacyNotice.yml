title: Privacy Notice
heading: Privacy notice (extended testing phase for landlords)
section:
  intro:
    paragraph:
      one: 'This notice explains your rights and how we use your personal data as a private landlord when you use the ''register your rental property'' service. This service is part of the Private Rented Sector Database (PRSD). The notice provides the information you are entitled to under UK data protection legislation. It sets out what personal and non-personal data is collected and how it will be used to test the service as we prepare for the implementation of the Renters'' Rights Act 2025.'
  one:
    heading: MHCLG’s role as Data Controller
    paragraph:
      one:
        beforeEmailLink: 'To meet the obligations in the Renters'' Rights Act 2025, the Ministry of Housing, Communities and Local Government (MHCLG) is required to develop and maintain the PRS Database, which allows for the collection of information from private landlords in the private rented sector. MHCLG is the Data Controller as described in the General Data Protection Regulation (UK GDPR) and the Data Protection Act 2018 (DPA). Our Data Protection Officer can be contacted at'
        emailLink: 'dpo@communities.gov.uk'
        afterEmailLink: .
  two:
    heading: What information we collect and why during the Extended Testing phase
    paragraph:
      one: 'As a landlord user, participation in this extended testing phase is entirely voluntary. To help us effectively test the database''s functionality in real-world scenarios, including how local councils interact with the data to identify and support compliance, we ask that you provide accurate and up-to-date information.'
    landlordPersonalData:
      heading: 2.1. Landlord personal data
      paragraph:
        one: 'This information directly identifies you as a landlord and is sourced via your GOV.UK One Login or direct input:'
      bullet:
        one: Landlord full name
        two: Date of birth
        three: Landlord address
        four: Email address
        five: Phone number
        six: PRS Database Landlord Registration Number (LRN)
        seven: Rental property address
    jointLandlordPersonalData:
      heading: 2.1.1. Joint Landlord personal data
      paragraph:
        one: 'If you are a joint landlord on a property with other landlords, we will collect the following information from you when you request to join a property or when you are invited to join a property.'
      bullet:
        one: Joint landlord full name
        two: Email address
        three: PRS Database Landlord Registration Number (LRN)
    propertyInformation:
      heading: '2.2. Property information and compliance data (not personal data)'
      paragraph:
        one: 'This information relates to the property you own and let. It is not personal data and cannot be used to identify you.'
      bullet:
        one: Local Council of the address
        two: Unique Property Reference Number (UPRN)
        three: Property build type
        four: Ownership type
        five: Selective licence details
        six: House in Multiple Occupation (HMO) licence details
        seven: HMO additional licence details
        eight: Property occupation status
        nine: Current number of people living in your property
        ten: Current number of households living in your property
        eleven: Current number of bedrooms in your property
        twelve: 'PRS Database property registration number (PRN, assigned by the PRS Database)'
    propertyCertificateDetails:
      heading: 2.2.1. Property certificate details
      bullet:
        one: Gas safety certificate details
        two: Electrical Installation Condition Report (EICR) and Electrical Installation Certificate (EIC) details
        three: Energy performance certificate (EPC)
        four: Minimum energy efficiency (MEES) details
    rentalInformation:
      heading: 2.2.2. Rental Information
      bullet:
        one: Rent amount
        two: Frequency of rent charged
        three: Utilities included
        four: Furnishing status
    surveyData:
      heading: 2.3. Survey Data
      paragraph:
        one: 'We may ask you to provide optional demographic personal data for accessibility and inclusivity testing. This data is stored separately and used only in aggregated statistical form or for research purposes if you give explicit consent to be contacted. Access to this data is restricted to a small number of authorised team members. The personal data includes:'
      bullet:
        one: 'Age range, sex, ethnicity and location'
        two: Digital confidence levels and landlord experience levels
        three: 'Research Contact: Name and email (only if you explicitly opt-in to be contacted for future user research).'
    usageData:
      heading: '2.4. Usage data (for service improvement and essential operational usage)'
      paragraph:
        one: 'We use Plausible Analytics to understand how the service is being used and to identify areas for improvement. Plausible does not use cookies, does not collect personal data and does not track you across different websites.'
        two: 'Statistical Purpose: We process this information as a "statistical exception" under the Data (Use and Access) Act 2025. This means we do not require your consent to collect this anonymised data as it is used purely to ensure the service is functional, accessible and meeting user needs.'
        three: 'Important note: Any significant changes to the types of data collected, the purposes for which it is used, or the entities with whom it is shared during this extended testing phase will be clearly communicated to you through updated privacy notices and direct notifications in advance of their implementation.'
        four: 'Your responsibilities as a landlord and what data is collected may differ for the mandatory service to this extended testing phase.'
    whyWeCollect:
      heading: 2.5. Why we collect your data
      paragraph:
        one: 'The data collected during this phase is used specifically to:'
      bullet:
        one: 'Test the user experience and functionality for landlords, letting agents and local council officers'
        two: Test the integration of the service with GOV.UK One Login
        three: Design an effective and gradual local council onboarding process
        four: Assess the effectiveness of the PRS Database in enabling local councils to perform their duties
        five: 'Establish feedback channels to identify and fix technical "bugs."'
        six: Preparation towards meeting the requirements for the government beta assessment (a key part in delivering a government digital service)
        seven: 'Meet the legal requirements of the Renters'' Rights Act 2025.'
        eight: 'Support administration, security and development of the service.'
        nine: 'Check whether the service meets accessibility and inclusivity standards (using optional demographic data).'
  three:
    heading: 3. Lawful basis for processing the data
    paragraph:
      one: 'The data protection legislation sets out when we are lawfully allowed to process your personal data.'
      two: 'For MHCLG, the lawful basis that applies to this processing is:'
      'two.bullet.one': '<strong>UK GDPR Article 6(1)(e)</strong> - the performance of a task carried out in the public interest or in the exercise of official authority (developing an accessible government service).'
      'two.bullet.two': '<strong>DPA 2018, Part 2, Chapter 2, section 8 (d)</strong> - the exercise of a function of the Crown, a Minister of the Crown or a government department. This enables us to provide you with access to the service, and to provide administration, support, security and develop the core functionality required for the service.'
      'two.bullet.three': '<strong>Service Improvement (Analytics)</strong> - Statistical Purposes Exception under the Data (Use & Access) Act 2025.'
      three: 'Ethnicity is classed as "special category data" under data protection law. We request this in the feedback survey (on an optional basis) so we can check whether our service works well for people from different backgrounds. Our lawful basis for collecting it is:'
      'three.bullet.one': '<strong>UK GDPR Article 9(2)(g)</strong> - processing is necessary for reasons of substantial public interest (developing an accessible government service). This is supported by Schedule 1, Part 2, paragraph 8 of the Data Protection Act 2018 (equality of opportunity or treatment).'
  four:
    heading: 4. With whom we will be sharing the data
    paragraph:
      one: 'We share data with a service provider, participating local councils, government and technical providers:'
      'two.heading': '4.1. Participating Local councils:'
      two: 'Data provided by a landlord during this phase will be accessible to local councils participating in the extended testing phase. Data is shared with the local councils under strict data sharing agreements. During this testing phase, councils are restricted to usability testing and will not take enforcement action based on this data.'
      'three.heading': '4.2. Service Provider (processor):'
      three: 'To provide service desk support functionality on behalf of MHCLG. We have a Data Processing Agreement in place to ensure that the data is processed securely and in accordance with all relevant data protection law. The processing will involve using your personal details to assist with your enquiries.'
      'four.heading': '4.3. Amazon Web Services (AWS):'
      four: 'To host the ''register your rental property'' service and store your data securely. All data is stored in the UK.'
      'five.heading': '4.4. GOV.UK Notify:'
      five: 'To send you essential communications, including registration confirmations, security codes (OTP) and compliance reminders via email or SMS.'
      'six.heading': '4.5. GOV.UK One Login:'
      six: To verify your identity before you access the service.
      'seven.heading': '4.6. GOV.UK Pay:'
      seven: 'To process your registration fee payments. We do not store your bank or card details; these are handled securely by GOV.UK Pay.'
      'eight.heading': '4.7. Specific Requirement for Joint Landlords:'
      eight: 'If you are registered as a joint landlord for a property, please note that for administrative transparency and system management, you will be able to view the following registration data of the other associated joint landlord(s):'
      'eight.bullet.one': Full Name
      'eight.bullet.two': Email Address
      'eight.bullet.three': Landlord Registration Number
  five:
    heading: 5. Retention period
    paragraph:
      one: 'We retain personal data only for as long as necessary for its specific purpose.'
      two: '<strong>Personal data:</strong> Your personal data referenced in section 2 and all associated property record will be securely deleted no more than one month after the conclusion of the Extended Testing phase. This means you will be required to re-register for the Mandatory Service once it launches.'
      three: '<strong>Survey data:</strong> If you participate in the extended testing phase survey, your responses and contact details (if you opt-in for future research) will be kept for 2 years for longitudinal analysis. Responses will be anonymised once analysis is complete. Anonymised transcripts may be kept for the duration of the project.'
      four: '<strong>De-registration:</strong> During this phase, you can choose to de-register yourself or your property at any point. Doing so will completely delete your landlord record and associated property records from the PRSD.'
  six:
    heading: '6. Your rights (such as access, rectification, erasure)'
    paragraph:
      one: 'The data we are collecting is your personal data, and you have rights that affect what happens to it. You have the right to:'
      'one.bullet.one': a. know that we are using your personal data
      'one.bullet.two': b. see what data we have about you
      'one.bullet.three': 'c. ask to have your data corrected, and to ask how we check the information we hold is accurate'
      'one.bullet.four': d. complain to the ICO (Information Commissioners Office) (see below)
      'one.bullet.five': 'e. in some circumstances, you may also have the right to withdraw your consent to us having or using your optional analytics data, to have all data about you deleted, or to object to particular types of use of your data. We will tell you when these rights apply.'
  seven:
    heading: 7. Sending data overseas
    paragraph:
      one: 'Your personal data (your name, date of birth, landlord address, email address, phone number, landlord registration number and usage data) collected will be processed within the UK. During the extended testing phase, we are not sending personal data overseas. We do have default in-region Amazon Web Services Relational Database Service (AWS RDS) copies that will be manually deleted as part of deleting the database records at the end of the extended testing phase. MHCLG will ensure that this complies with data protection law and that appropriate safeguards are in place to protect your personal data.'
  eight:
    heading: 8. Automated decision making
    paragraph:
      one: We will not use your data for any automated decision making.
  nine:
    heading: '9. Storage, security and data management'
    paragraph:
      one: 'Your personal data will be stored in a secure government IT system with appropriate technical and organisational measures in place to protect it from unauthorised access, use or disclosure.'
  complaints:
    heading: Complaints and more information
    paragraph:
      one: 'When we ask you for information, we will keep to the law, including the Data Protection Act 2018 and UK General Data Protection Regulation.'
      two:
        beforeLink: 'If you are unhappy with the way the Department has acted, you can'
        linkText: make a complaint (opens in new tab)
        afterLink: .
      three:
        beforeEmailLink: 'If you want to make a request to access your data or another request in relation to your rights, or if you are not happy with how we are using your personal data, you can contact'
        emailLinkText: 'dataprotection@communities.gov.uk'
        afterEmailLink: .
      four: 'If you still have concern about the way in which MHCLG has handled your personal data, or for independent advice about data protection, privacy and data sharing, you can contact:'
      five:
        beforeLink: Further information about your data protection rights can also be found on the
        link: Information Commissioner’s website (opens in new tab)
        afterLink: .
    ico:
      address:
        title: 'Address:'
        line:
          one: The Information Commissioner’s Office
          two: Wycliffe House
          three: Water Lane
          four: 'Wilmslow, Cheshire,'
          five: SK9 5AF
      phone:
        title: 'Telephone:'
        numberText: 0303 123 1113 or 01625 545 745
      website:
        title: 'Website:'
