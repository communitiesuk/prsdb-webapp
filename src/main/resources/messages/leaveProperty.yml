title: No longer a landlord
confirm:
  heading: "Confirm that you’re no longer a landlord for {0,,address}"
  body: You should only do this if you’re no longer involved in renting out this property.
  reasonsIntro: "This could be because:"
  reason:
    one: the property has stopped being rented out
    two: you’re no longer a joint landlord (for example, you’ve been bought out)
  councilNote: The local council will no longer see your details when they view this property.
  warning: You cannot undo this action. If you need to join the property again in the future, you’ll need to be invited by another landlord or send a request to join.
  confirmButton: I’m no longer a landlord
  cancelLink: Cancel (go back to property record)
confirmation:
  banner:
    heading: "No longer registered as a landlord for {0,,address}"
  paragraph:
    one: "We’ve sent you a confirmation email. We’ve also told the other joint landlords that you’re no longer registered on this property."
    two: You can no longer view this property’s details on the service.
