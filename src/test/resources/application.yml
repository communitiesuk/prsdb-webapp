spring:
  application:
    name: 'prsdb-webapp'
  cloud:
    aws:
      region:
        static: eu-west-2
  mvc:
    format:
      date: "d MMMM yyyy"
  servlet:
    multipart:
      enabled: false

one-login:
  jwt:
    public.key: classpath:public_key.pem
    private.key: classpath:private_key.pem
  did.uri: https://example.com/.well-known/did.json

notify:
  api-key: ${EMAILNOTIFICATIONS_APIKEY}
  support-email: support@example.com
  use-production-notify: false

base-url:
  landlord: example.com
  local-council: example.com

aws:
  s3:
    quarantineBucket: 'quarantine-bucket'
    safeBucket: 'safe-bucket'
    signatureDuration: '1h'

plausible:
  site-id: test-site-id

beta-feedback:
  team-email-address: feedback@example.com

os:
  api-key: ${OS_API_KEY}
  downloads.base-url: https://api.os.uk/downloads/v1

ff4j:
  web-console:
    enabled: false

features:
  feature-flags:
    - name: "failover-test-endpoints"
      enabled: true
      expiry-date: "2026-12-31"
    - name: "joint-landlords"
      enabled: false
      expiry-date: "2026-12-31"
    - name: "subject-identifier-page"
      enabled: false
      expiry-date: "2027-03-30"
    - name: "compliance-actions-may2026-redesign"
      enabled: false
      expiry-date: "2026-12-31"
      release: "private-beta-release-2"
  releases:
    - name: "private-beta-release-2"
      enabled: false
