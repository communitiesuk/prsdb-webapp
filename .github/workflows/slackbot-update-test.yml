name: Slackbot Update Test
on:
  workflow_call:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        type: string
      branch:
        required: true
        type: string
    secrets:
      ONE_LOGIN_PRIVATE_KEY:
        required: true
      ONE_LOGIN_PUBLIC_KEY:
        required: true
      NOTIFY_KEY:
        required: true
      SLACK_WEBHOOK:
        required: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: 17
          cache: 'gradle'

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Run npm tests
        run: npm test

      - name: Run gradle `check` to run linting and tests
        env:
          ONE_LOGIN_PRIVATE_KEY: |
            ${{ secrets.ONE_LOGIN_PRIVATE_KEY }}
          ONE_LOGIN_PUBLIC_KEY: |
            ${{ secrets.ONE_LOGIN_PUBLIC_KEY }}
          EMAILNOTIFICATIONS_APIKEY: ${{ secrets.NOTIFY_KEY }}
          EMAILNOTIFICATIONS_USE_PRODUCTION_NOTIFY: github.base_ref == 'production' || github.merge_group.base_ref == 'refs/head/production'
        run: ./gradlew clean check --no-daemon

  report-pipeline-status:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Report pipeline status
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "environment": ${{ toJson(inputs.environment) }},
              "commit": ${{ toJson(github.event.head_commit.message) }},
              "result": "${{ (needs.test.result == 'success' || needs.test.result == 'skipped') && 'Success :tick:' || 'Failure :no-cross:' }}",
              "url": "${{ format('https://github.com/communitiesuk/prsdb-webapp/actions/runs/{0}', github.run_id) }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}